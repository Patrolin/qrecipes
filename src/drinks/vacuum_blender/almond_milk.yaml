almond milk:
  tools:
    vacuum blender:
    nut bag:
  inputs:
    - 1 cup almonds
    - 3-4 cups water
    - a pinch of salt
    - honey?
  serving: 4-5 cups (≥240ml)
  longetivity: Store for 3-4 days in a fridge.
  steps:
    1: Soak the almonds in water overnight (for better texture, and less strain on the blender).
    2: Drain and rinse the almonds.
    3: Blend everything for 1-2 minutes.
    4: Pour through a nut milk bag or fine strainer.
