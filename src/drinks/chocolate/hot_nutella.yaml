hot nutella:
  tools:
    - microwave
  inputs:
    - 200 ml milk
    - 1-2 tbsp nutella (but NOT the "nutella" brand, see also - storage requirements on the nutella)
  serving: mug (≥240ml)
  steps:
    1: Pour the milk into a mug
    2: Heat the mug in a microwave for 1 minute
    3: Add the nutella and mix
