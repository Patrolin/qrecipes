lemonade:
  source: https://www.allrecipes.com/recipe/281089/state-fair-lemonade/
  time:
    prep: 5m
    waiting: 2h
  tools:
    strainer:
    pot:
  inputs:
    - 1 lemon
    - 20 g sugar
    - 200 ml water
  serving: 1 glass (240 ml)
  steps:
    1: Peel the yellow part of the lemon skin and store the lemons for later.
    2: Mix the lemon zest and sugar in a bowl.
    3: Cover the bowl and let it sit for 2 hours.
    4: Bring 100 ml water to boiling in a pot and turn off the heat.
    5: Add the lemon/sugar mixture and mix until the sugar dissolves.
    6: Add another 100 ml water into the original bowl
    7: Pour the mixture through a strainer into the bowl.
    8: Cut the lemons in half and squeeze over the strainer.
