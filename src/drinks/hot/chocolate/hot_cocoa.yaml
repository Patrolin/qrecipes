hot cocoa:
  tools:
    - saucepan
    - whisk
  inputs:
    - 230 ml milk or almond milk [Alpro Nutty almond]
    - 2 tsp cocoa powder
    - 8 g vanilla sugar
    - a pinch of salt
  serving: 1 mug (≥240ml)
  steps:
    1: Add all ingredients into a saucepan.
    2: Warm up the saucepan to below boiling (60 - 75°C).
    3: Break up the cocoa into smaller pieces with a whisk until it melts.
